
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول | سلافة أدمن</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#1a3a1a 0%,#2d6b2d 55%,#3d8b3d 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:2rem}
.logo-mark{font-size:3.5rem;margin-bottom:.5rem}
.logo-name{font-size:2rem;font-weight:900;color:#1a3a1a}
.logo-sub{font-size:.8rem;color:#5a7a5a;letter-spacing:2px;text-transform:uppercase}
h2{font-size:1.2rem;font-weight:800;color:#1a3a1a;margin-bottom:1.5rem;text-align:center}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.87rem;font-weight:700;color:#2d6b2d;margin-bottom:.4rem}
.field input{width:100%;padding:12px 15px;border:2px solid #e0ead0;border-radius:10px;font-family:inherit;font-size:.95rem;outline:none;transition:.2s}
.field input:focus{border-color:#3d8b3d;box-shadow:0 0 0 3px rgba(61,139,61,.1)}
.submit-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#1a3a1a,#2d6b2d);color:#fff;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;margin-top:.5rem;transition:.2s}
.submit-btn:hover{background:linear-gradient(135deg,#2d6b2d,#3d8b3d);transform:translateY(-1px)}
.error{background:#ffebee;color:#c0392b;border:1.5px solid #ef9a9a;border-radius:10px;padding:10px 15px;font-size:.88rem;font-weight:600;margin-bottom:1rem;text-align:center}
.back{text-align:center;margin-top:1.25rem;font-size:.85rem;color:#5a7a5a}
.back a{color:#2d6b2d;font-weight:700}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-name">سلافة</div>
    <div class="logo-sub">Admin Panel</div>
  </div>
  <h2>تسجيل دخول المسؤول</h2>
  {% if error %}
  <div class="error"> اسم المستخدم أو كلمة المرور غلط</div>
  {% endif %}
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="error">{{ msg }}</div>
  {% endfor %}
{% endwith %}
  <form method="POST">
    
    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" name="username" value="{{ request.form.get('username', '') }}" required autofocus>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="submit-btn"> دخول</button>
  </form>
  <div class="back"><a href="{{ url_for('index') }}">← العودة للموقع</a></div>
</div>
</body>
</html>
